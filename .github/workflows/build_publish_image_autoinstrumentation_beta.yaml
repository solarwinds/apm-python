name: "Publish Beta APM Python Auto-Instrumentation"

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: write
  id-token: write
  security-events: write

jobs:
  docker_hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read solarwinds_apm version requirement
        run: echo VERSION=$(head -n 1 image/requirements-nodeps-beta.txt | cut -d '=' -f3) >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into Docker.io (build)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_SOLARWINDS_ORG_LOGIN }}
          password: ${{ secrets.ENOPS5919_APM_DOCKER_HUB_CI_OAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ github.repository_owner }}/autoinstrumentation-python
          tags: |
            type=raw,value=${{ env.VERSION }}-beta
          labels: |
            maintainer=swo-librarians
            org.opencontainers.image.title=apm-python
            org.opencontainers.image.description=Solarwinds OTEL distro Python agent
            org.opencontainers.image.vendor=SolarWinds Worldwide, LLC

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # TEMP: Push disabled to test Jira ticket creation
      # - name: Build and push - amd64, arm64
      #   uses: docker/build-push-action@v7
      #   with:
      #     push: true
      #     context: image
      #     file: image/Dockerfile-beta
      #     platforms: linux/amd64,linux/arm64
      #     build-args: version=${{ env.VERSION }}-beta
      #     tags: ${{ steps.meta.outputs.tags }}
      #     labels: ${{ steps.meta.outputs.labels }}

      - name: Build locally for scan - amd64
        uses: docker/build-push-action@v7
        with:
          load: true
          context: image
          platforms: linux/amd64
          build-args: version=${{ env.VERSION }}-beta
          tags: ${{ steps.meta.outputs.tags }}-scan
          labels: ${{ steps.meta.outputs.labels }}

      - name: Log into Docker.io (scan)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.ENOPS5919_DOCKER_SCOUT_CI_USER }}
          password: ${{ secrets.ENOPS5919_DOCKER_SCOUT_CI_PAT }}

      - name: Analyze for critical and high CVEs - tagged image
        id: docker-scout-image-cves
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ steps.meta.outputs.tags[0] }}
          platform: "linux/amd64"
          sarif-file: sarif.output.json

      - name: Upload SARIF result
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif.output.json

      - name: Parse SARIF for Critical/High CVEs
        id: parse-cves
        run: |
          # Extract CVEs from SARIF
          jq -r '.runs[0].results[] | 
            select(.level == "error" or .level == "warning") | 
            @json' sarif.output.json > vulnerabilities.json
          
          # Count vulnerabilities
          echo "count=$(jq -s 'length' vulnerabilities.json)" >> $GITHUB_OUTPUT

      - name: Create Jira tickets with actionable details
        if: steps.parse-cves.outputs.count > 0
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set +e  # Don't exit on error, handle errors explicitly
          
          # Validate secrets are set
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_USER_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ]; then
            echo "❌ ERROR: Required Jira secrets are not set"
            echo "JIRA_BASE_URL: ${JIRA_BASE_URL:+SET}"
            echo "JIRA_USER_EMAIL: ${JIRA_USER_EMAIL:+SET}"
            echo "JIRA_API_TOKEN: ${JIRA_API_TOKEN:+SET}"
            exit 1
          fi
          
          # Test connectivity to Jira
          echo "Testing connection to Jira at: ${JIRA_BASE_URL}"
          HEALTH_CHECK=$(curl -s -w "\n%{http_code}" --max-time 10 "${JIRA_BASE_URL}/status" 2>&1)
          HEALTH_CODE=$(echo "$HEALTH_CHECK" | tail -n1)
          echo "Jira connectivity test returned: $HEALTH_CODE"
          
          echo "Processing ${{ steps.parse-cves.outputs.count }} vulnerabilities..."
          
          TICKET_COUNT=0
          ERROR_COUNT=0
          
          while IFS= read -r vuln; do
            CVE=$(echo "$vuln" | jq -r '.ruleId')
            PACKAGE=$(echo "$vuln" | jq -r '.locations[0].physicalLocation.artifactLocation.uri // "unknown"')
            VERSION=$(echo "$vuln" | jq -r '.locations[0].physicalLocation.region.snippet.text // "unknown"')
            MESSAGE=$(echo "$vuln" | jq -r '.message.text')
            SEVERITY=$(echo "$vuln" | jq -r '.level')
            
            echo "----------------------------------------"
            echo "Processing CVE: ${CVE}"
            echo "Package: ${PACKAGE}"
            echo "Severity: ${SEVERITY}"
            
            # Prepare values for Jira ticket
            SEVERITY_TEXT=$([ "$SEVERITY" = "error" ] && echo "Critical" || echo "High")
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            
            # Build complete Jira request with ADF description using jq
            TEAM_ID="${{ secrets.JIRA_TEAM_FIELD_ID }}"
            REPORT_DATE=$(date +%Y-%m-%d)
            VULN_COMPONENT="${PACKAGE}-${VERSION}"
            
            if [ -n "$TEAM_ID" ]; then
              # Build with team field and ADF description
              JIRA_REQUEST=$(jq -n \
                --arg cve "$CVE" \
                --arg pkg "$PACKAGE" \
                --arg ver "$VERSION" \
                --arg sev "$SEVERITY_TEXT" \
                --arg img "${{ steps.meta.outputs.tags[0] }}" \
                --arg msg "$MESSAGE" \
                --arg url "$WORKFLOW_URL" \
                --arg commit "${{ github.sha }}" \
                --arg summary "${CVE}: Python - ${PACKAGE}" \
                --arg teamId "$TEAM_ID" \
                --arg reportDate "$REPORT_DATE" \
                --arg vulnComponent "$VULN_COMPONENT" \
                '{
                  fields: {
                    project: {key: "NH"},
                    summary: $summary,
                    description: {
                      version: 1,
                      type: "doc",
                      content: [
                        {type: "heading", attrs: {level: 2}, content: [{type: "text", text: "Security Vulnerability Detected"}]},
                        {type: "paragraph", content: [{type: "text", text: "CVE: ", marks: [{type: "strong"}]}, {type: "text", text: $cve}]},
                        {type: "paragraph", content: [{type: "text", text: "Package: ", marks: [{type: "strong"}]}, {type: "text", text: $pkg}]},
                        {type: "paragraph", content: [{type: "text", text: "Version: ", marks: [{type: "strong"}]}, {type: "text", text: $ver}]},
                        {type: "paragraph", content: [{type: "text", text: "Severity: ", marks: [{type: "strong"}]}, {type: "text", text: $sev}]},
                        {type: "paragraph", content: [{type: "text", text: "Image: ", marks: [{type: "strong"}]}, {type: "text", text: $img}]},
                        {type: "heading", attrs: {level: 3}, content: [{type: "text", text: "Description"}]},
                        {type: "paragraph", content: [{type: "text", text: $msg}]},
                        {type: "heading", attrs: {level: 3}, content: [{type: "text", text: "Recommended Action"}]},
                        {type: "paragraph", content: [{type: "text", text: "Upgrade the vulnerable dependency to the latest secure version."}]},
                        {type: "heading", attrs: {level: 3}, content: [{type: "text", text: "Detection Source"}]},
                        {type: "paragraph", content: [{type: "text", text: "Workflow Run: ", marks: [{type: "strong"}]}, {type: "text", text: $url, marks: [{type: "link", attrs: {href: $url}}]}]},
                        {type: "paragraph", content: [{type: "text", text: "Commit: ", marks: [{type: "strong"}]}, {type: "text", text: $commit}]}
                      ]
                    },
                    issuetype: {name: "Security Vuln"},
                    components: [{name: "Instrument Python"}],
                    customfield_10001: $teamId,
                    customfield_10369: $reportDate,
                    customfield_10374: ("[" + $cve + "]"),
                    customfield_10392: $vulnComponent,
                    labels: ["docker-scout"],
                    priority: {name: "Critical"}
                  }
                }')
            else
              # Build without team field and ADF description
              JIRA_REQUEST=$(jq -n \
                --arg cve "$CVE" \
                --arg pkg "$PACKAGE" \
                --arg ver "$VERSION" \
                --arg sev "$SEVERITY_TEXT" \
                --arg img "${{ steps.meta.outputs.tags[0] }}" \
                --arg msg "$MESSAGE" \
                --arg url "$WORKFLOW_URL" \
                --arg commit "${{ github.sha }}" \
                --arg summary "${CVE}: Python - ${PACKAGE}" \
                --arg reportDate "$REPORT_DATE" \
                --arg vulnComponent "$VULN_COMPONENT" \
                '{
                  fields: {
                    project: {key: "NH"},
                    summary: $summary,
                    description: {
                      version: 1,
                      type: "doc",
                      content: [
                        {type: "heading", attrs: {level: 2}, content: [{type: "text", text: "Security Vulnerability Detected"}]},
                        {type: "paragraph", content: [{type: "text", text: "CVE: ", marks: [{type: "strong"}]}, {type: "text", text: $cve}]},
                        {type: "paragraph", content: [{type: "text", text: "Package: ", marks: [{type: "strong"}]}, {type: "text", text: $pkg}]},
                        {type: "paragraph", content: [{type: "text", text: "Version: ", marks: [{type: "strong"}]}, {type: "text", text: $ver}]},
                        {type: "paragraph", content: [{type: "text", text: "Severity: ", marks: [{type: "strong"}]}, {type: "text", text: $sev}]},
                        {type: "paragraph", content: [{type: "text", text: "Image: ", marks: [{type: "strong"}]}, {type: "text", text: $img}]},
                        {type: "heading", attrs: {level: 3}, content: [{type: "text", text: "Description"}]},
                        {type: "paragraph", content: [{type: "text", text: $msg}]},
                        {type: "heading", attrs: {level: 3}, content: [{type: "text", text: "Recommended Action"}]},
                        {type: "paragraph", content: [{type: "text", text: "Upgrade the vulnerable dependency to the latest secure version."}]},
                        {type: "heading", attrs: {level: 3}, content: [{type: "text", text: "Detection Source"}]},
                        {type: "paragraph", content: [{type: "text", text: "Workflow Run: ", marks: [{type: "strong"}]}, {type: "text", text: $url, marks: [{type: "link", attrs: {href: $url}}]}]},
                        {type: "paragraph", content: [{type: "text", text: "Commit: ", marks: [{type: "strong"}]}, {type: "text", text: $commit}]}
                      ]
                    },
                    issuetype: {name: "Security Vuln"},
                    components: [{name: "Instrument Python"}],
                    customfield_10369: $reportDate,
                    customfield_10374: ("[" + $cve + "]"),
                    customfield_10392: $vulnComponent,
                    labels: ["docker-scout"],
                    priority: {name: "Critical"}
                  }
                }')
            fi
            
            # Validate JSON payload before sending
            if ! echo "$JIRA_REQUEST" | jq empty 2>/dev/null; then
              echo "❌ ERROR: Generated invalid JSON payload"
              echo "First 500 chars of payload:"
              echo "$JIRA_REQUEST" | head -c 500
              ((ERROR_COUNT++))
              continue
            fi
            
            # Show payload size and preview for first request
            if [ $TICKET_COUNT -eq 0 ] && [ $ERROR_COUNT -eq 0 ]; then
              PAYLOAD_SIZE=$(echo "$JIRA_REQUEST" | wc -c)
              echo "Payload size: ${PAYLOAD_SIZE} bytes"
              echo "Payload preview (first 300 chars):"
              echo "$JIRA_REQUEST" | head -c 300
              echo "..."
              echo ""
              
              # Test base64 encoding
              TEST_BASE64=$(echo -n "test@example.com:token123" | base64)
              echo "Base64 encoding test successful: ${#TEST_BASE64} chars"
            fi
            
            # Attempt Jira API call with additional debugging for first request only
            if [ $TICKET_COUNT -eq 0 ] && [ $ERROR_COUNT -eq 0 ]; then
              echo "First request - showing connection details (auth headers masked)..."
              echo "POST ${JIRA_BASE_URL}/rest/api/3/issue"
              echo "Authorization: Basic ****MASKED****"
              echo "Content-Type: application/json"
              echo "User-Agent: GitHub-Actions-Docker-Scout-CVE-Reporter/1.0"
              
              # Use temp files for both request and response
              TEMP_REQUEST=$(mktemp)
              TEMP_RESPONSE=$(mktemp)
              echo "$JIRA_REQUEST" > "$TEMP_REQUEST"
              
              # Use write-out to get connection timing and detailed diagnostics
              JIRA_METRICS=$(curl -v -w "\ntime_namelookup:%{time_namelookup}\ntime_connect:%{time_connect}\ntime_appconnect:%{time_appconnect}\ntime_pretransfer:%{time_pretransfer}\ntime_starttransfer:%{time_starttransfer}\ntime_total:%{time_total}\nhttp_code:%{http_code}\nsize_upload:%{size_upload}" \
                --connect-timeout 30 --max-time 90 \
                -o "$TEMP_RESPONSE" \
                -X POST "${JIRA_BASE_URL}/rest/api/3/issue" \
                -H "Authorization: Basic $(echo -n ${JIRA_USER_EMAIL}:${JIRA_API_TOKEN} | base64)" \
                -H "Content-Type: application/json" \
                -H "User-Agent: GitHub-Actions-Docker-Scout-CVE-Reporter/1.0" \
                -d @"$TEMP_REQUEST" 2>&1)
              
              # Extract timing info from metrics
              echo "DNS lookup time: $(echo "$JIRA_METRICS" | grep time_namelookup | cut -d: -f2)"
              echo "Connect time: $(echo "$JIRA_METRICS" | grep time_connect | cut -d: -f2)"
              echo "SSL handshake time: $(echo "$JIRA_METRICS" | grep time_appconnect | cut -d: -f2)"
              echo "Pre-transfer time: $(echo "$JIRA_METRICS" | grep time_pretransfer | cut -d: -f2)"
              echo "Time to first byte: $(echo "$JIRA_METRICS" | grep time_starttransfer | cut -d: -f2)"
              echo "Total time: $(echo "$JIRA_METRICS" | grep time_total | cut -d: -f2)"
              echo "Bytes uploaded: $(echo "$JIRA_METRICS" | grep size_upload | cut -d: -f2)"
              
              # Get HTTP code and response body
              HTTP_CODE=$(echo "$JIRA_METRICS" | grep http_code | cut -d: -f2 | tr -d ' ')
              RESPONSE_BODY=$(cat "$TEMP_RESPONSE")
              rm -f "$TEMP_REQUEST" "$TEMP_RESPONSE"
              
              # Show curl diagnostics if HTTP 000
              if [ "$HTTP_CODE" = "000" ]; then
                echo "⚠️  HTTP 000 error - showing curl diagnostics:"
                echo "$JIRA_METRICS" | head -n 100
              fi
            else
              # Use temp file for request body (subsequent requests)
              TEMP_REQUEST=$(mktemp)
              echo "$JIRA_REQUEST" > "$TEMP_REQUEST"
              
              JIRA_RESPONSE=$(curl -s -w "\n%{http_code}" --connect-timeout 30 --max-time 90 \
                -X POST "${JIRA_BASE_URL}/rest/api/3/issue" \
                -H "Authorization: Basic $(echo -n ${JIRA_USER_EMAIL}:${JIRA_API_TOKEN} | base64)" \
                -H "Content-Type: application/json" \
                -H "User-Agent: GitHub-Actions-Docker-Scout-CVE-Reporter/1.0" \
                -d @"$TEMP_REQUEST")
              
              HTTP_CODE=$(echo "$JIRA_RESPONSE" | tail -n1)
              RESPONSE_BODY=$(echo "$JIRA_RESPONSE" | sed '$d')
              rm -f "$TEMP_REQUEST"
            fi
            
            # Process response (HTTP_CODE and RESPONSE_BODY already set above)
            if [ "$HTTP_CODE" = "000" ]; then
              echo "❌ Connection error (curl returned 000) - check curl diagnostics above"
              ((ERROR_COUNT++))
            elif [[ "$HTTP_CODE" =~ ^2[0-9][0-9]$ ]]; then
              JIRA_KEY=$(echo "$RESPONSE_BODY" | jq -r '.key // "null"')
              if [ "$JIRA_KEY" != "null" ] && [ -n "$JIRA_KEY" ]; then
                JIRA_URL="${JIRA_BASE_URL}/browse/${JIRA_KEY}"
                echo "✅ Created Jira ticket ${JIRA_KEY}: ${JIRA_URL}"
                ((TICKET_COUNT++))
              else
                echo "❌ Failed to parse Jira key from response"
                echo "Response: $RESPONSE_BODY"
                ((ERROR_COUNT++))
              fi
            else
              echo "❌ Jira API returned HTTP $HTTP_CODE"
              echo "Response: $RESPONSE_BODY"
              ((ERROR_COUNT++))
            fi
            
          done < vulnerabilities.json
          
          echo "========================================="
          echo "Summary: Created $TICKET_COUNT tickets, $ERROR_COUNT errors"
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "⚠️  Some tickets failed to create. Check logs above."
            exit 1
          fi

