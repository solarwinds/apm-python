name: Verify Installation - Linux

on:
  push:
    branches:
      - main
  pull_request:
    type: [opened, reopened]
  workflow_dispatch:
    inputs:
      install-registry:
        required: true
        description: 'Registry/Source used for install tests, one of: pypi, testpypi, local (contents of current branch)'
        type: choice
        default: 'local'
        options:
        - pypi
        - testpypi
        - local
      solarwinds-version:
        required: false
        description: 'Optional solarwinds-apm version, e.g. 0.0.3.2'

env:
  SOLARWINDS_APM_VERSION: ${{ github.event.inputs.solarwinds-version }}
  SW_APM_COLLECTOR_PROD: ${{ secrets.SW_APM_COLLECTOR_PROD }}
  SW_APM_COLLECTOR_STAGING: ${{ secrets.SW_APM_COLLECTOR_STAGING }}
  SW_APM_SERVICE_KEY_PROD: ${{ secrets.SW_APM_SERVICE_KEY_PROD }}
  SW_APM_SERVICE_KEY_STAGING: ${{ secrets.SW_APM_SERVICE_KEY_STAGING }}

permissions:
  id-token: write
  contents: read

jobs:
  install-tests:
    runs-on: ${{ matrix.arch == 'arm64' && fromJSON('{"group":"apm-arm-runner"}') || 'ubuntu-latest' }}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    strategy:
      matrix:
        hostname:
          - py3.10-alpine3.13
          - py3.10-alpine3.16
          - py3.10-alpine3.17
          - py3.10-debian10
          - py3.10-debian11
          - py3.10-ubuntu22.04
          - py3.11-alpine3.16
          - py3.11-alpine3.17
          - py3.11-debian10
          - py3.11-debian11
          - py3.12-alpine3.19
          - py3.12-alpine3.20
          - py3.12-debian11
          - py3.12-debian12
          - py3.13-amazon2023-arm64
          - py3.13-amazon2023-x86-64
          - py3.13-debian11
          - py3.13-debian12
          - py3.13-alpine3.19
          - py3.13-alpine3.20
          - py3.14-amazon2023-arm64
          - py3.14-amazon2023-x86-64
          - py3.14-debian12
          - py3.14-debian13
          - py3.14-alpine3.22
          - py3.14-alpine3.23
        arch:
          - x64
          - arm64
        include:
          - hostname: py3.10-alpine3.13
            image: python:3.10-alpine3.13
          - hostname: py3.10-alpine3.16
            image: python:3.10-alpine3.16
          - hostname: py3.10-alpine3.17
            image: python:3.10-alpine3.17
          - hostname: py3.10-debian10
            image: python:3.10-buster
          - hostname: py3.10-debian11
            image: python:3.10-bullseye
          - hostname: py3.10-ubuntu22.04
            image: ubuntu:22.04
          - hostname: py3.11-alpine3.16
            image: python:3.11-alpine3.16
          - hostname: py3.11-alpine3.17
            image: python:3.11-alpine3.17
          - hostname: py3.11-debian10
            image: python:3.11-buster
          - hostname: py3.11-debian11
            image: python:3.11-bullseye
          - hostname: py3.12-alpine3.19
            image: python:3.12-alpine3.19
          - hostname: py3.12-alpine3.20
            image: python:3.12-alpine3.20
          - hostname: py3.12-debian11
            image: python:3.12-bullseye
          - hostname: py3.12-debian12
            image: python:3.12-bookworm
          - hostname: py3.13-amazon2023-arm64
            image: amazon/aws-lambda-python:3.13-arm64
          - hostname: py3.13-amazon2023-x86-64
            image: amazon/aws-lambda-python:3.13-x86_64
          - hostname: py3.13-debian11
            image: python:3.13-bullseye
          - hostname: py3.13-debian12
            image: python:3.13-bookworm
          - hostname: py3.13-alpine3.19
            image: python:3.13-alpine3.19
          - hostname: py3.13-alpine3.20
            image: python:3.13-alpine3.20
          - hostname: py3.14-amazon2023-arm64
            image: amazon/aws-lambda-python:3.14-arm64
          - hostname: py3.14-amazon2023-x86-64
            image: amazon/aws-lambda-python:3.14-x86_64
          - hostname: py3.14-debian12
            image: python:3.14-bookworm
          - hostname: py3.14-debian13
            image: python:3.14-trixie
          - hostname: py3.14-alpine3.22
            image: python:3.14-alpine3.22
          - hostname: py3.14-alpine3.23
            image: python:3.14-alpine3.23
        exclude:
          # Note: JavaScript Actions (checkout) in Alpine only supported in x64
          - hostname: py3.10-alpine3.13
            arch: arm64
          - hostname: py3.10-alpine3.16
            arch: arm64
          - hostname: py3.10-alpine3.17
            arch: arm64
          - hostname: py3.11-alpine3.16
            arch: arm64
          - hostname: py3.11-alpine3.17
            arch: arm64
          - hostname: py3.12-alpine3.19
            arch: arm64
          - hostname: py3.12-alpine3.20
            arch: arm64
          - hostname: py3.13-alpine3.19
            arch: arm64
          - hostname: py3.13-alpine3.20
            arch: arm64
          - hostname: py3.14-alpine3.22
            arch: arm64
          - hostname: py3.14-alpine3.23
            arch: arm64
          # Mutual excludes for arch-specific Amazon hosts
          - hostname: py3.13-amazon2023-arm64
            arch: x64
          - hostname: py3.13-amazon2023-x86-64
            arch: arm64
          - hostname: py3.14-amazon2023-arm64
            arch: x64
          - hostname: py3.14-amazon2023-x86-64
            arch: arm64
    container:
      image: "${{ matrix.image }}"
      options: --hostname "${{ matrix.hostname }}"
    steps:
      - if: contains(matrix.image, 'amazonlinux') || contains(matrix.image, 'aws-lambda-python')
        name: Install AmazonLinux deps to use checkout
        run: |
          if command -v dnf >/dev/null 2>&1; then
            dnf install -y tar gzip
          else
            yum install -y tar gzip
          fi
      # Use checkout@v4 for Alpine versions < 3.17 that don't support Node.js 24
      - if: contains(matrix.hostname, 'alpine3.13') || contains(matrix.hostname, 'alpine3.14') || contains(matrix.hostname, 'alpine3.15') || contains(matrix.hostname, 'alpine3.16')
        uses: actions/checkout@v7
      # Else use latest checkout
      - if: ${{ !(contains(matrix.hostname, 'alpine3.13') || contains(matrix.hostname, 'alpine3.14') || contains(matrix.hostname, 'alpine3.15') || contains(matrix.hostname, 'alpine3.16') || contains(matrix.hostname, 'amazon2-')) }}
        uses: actions/checkout@v7
      - name: Setup and run install test
        working-directory: ./tests/docker/install
        run: APM_ROOT=$GITHUB_WORKSPACE ./_helper_run_install_tests.sh
        shell: sh
        env:
          MODE: ${{ github.event.inputs.install-registry }}

  # Amazon Linux 2 (Python 3.10) - uses docker run instead of container job to avoid GLIBC 2.26 issues
  install-tests-amazon2:
    runs-on: ${{ contains(matrix.image, 'arm64') && fromJSON('{"group":"apm-arm-runner"}') || 'ubuntu-latest' }}
    strategy:
      matrix:
        image:
          - amazon/aws-lambda-python:3.10-arm64
          - amazon/aws-lambda-python:3.10-x86_64
    steps:
      - uses: actions/checkout@v7
      - name: Run install test in Amazon Linux 2 container
        run: |
          docker run --rm \
            --entrypoint sh \
            -v $GITHUB_WORKSPACE:/code/python-solarwinds \
            -w /code/python-solarwinds/tests/docker/install \
            -e MODE="${{ github.event.inputs.install-registry }}" \
            -e PYTHON_VERSION="3.10" \
            -e SOLARWINDS_APM_VERSION="${{ github.event.inputs.solarwinds-version }}" \
            -e SW_APM_COLLECTOR_PROD="${{ secrets.SW_APM_COLLECTOR_PROD }}" \
            -e SW_APM_COLLECTOR_STAGING="${{ secrets.SW_APM_COLLECTOR_STAGING }}" \
            -e SW_APM_SERVICE_KEY_PROD="${{ secrets.SW_APM_SERVICE_KEY_PROD }}" \
            -e SW_APM_SERVICE_KEY_STAGING="${{ secrets.SW_APM_SERVICE_KEY_STAGING }}" \
            -e APM_ROOT=/code/python-solarwinds \
            ${{ matrix.image }} \
            -c "set -x && ./_helper_run_install_tests.sh"
