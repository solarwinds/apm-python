name: "Publish APM Python Auto-Instrumentation"

on:
  workflow_dispatch:

permissions:
  packages: write
  contents: write
  id-token: write
  security-events: write

jobs:
  docker_hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read solarwinds_apm version requirement
        run: echo VERSION=$(head -n 1 image/requirements-nodeps.txt | cut -d '=' -f3) >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into Docker.io (build)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_SOLARWINDS_ORG_LOGIN }}
          password: ${{ secrets.ENOPS5919_APM_DOCKER_HUB_CI_OAT }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ github.repository_owner }}/autoinstrumentation-python
          tags: |
            type=raw,value=${{ env.VERSION }}
            type=raw,value=latest
          labels: |
            maintainer=swo-librarians
            org.opencontainers.image.title=apm-python
            org.opencontainers.image.description=Solarwinds OTEL distro Python agent
            org.opencontainers.image.vendor=SolarWinds Worldwide, LLC

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push - amd64, arm64
        uses: docker/build-push-action@v7
        with:
          push: true
          context: image
          platforms: linux/amd64,linux/arm64
          build-args: version=${{ env.VERSION }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build locally for scan - amd64
        uses: docker/build-push-action@v7
        with:
          load: true
          context: image
          platforms: linux/amd64
          build-args: version=${{ env.VERSION }}
          tags: ${{ steps.meta.outputs.tags }}-scan
          labels: ${{ steps.meta.outputs.labels }}

      - name: Log into Docker.io (scan)
        uses: docker/login-action@v4
        with:
          username: ${{ vars.ENOPS5919_DOCKER_SCOUT_CI_USER }}
          password: ${{ secrets.ENOPS5919_DOCKER_SCOUT_CI_PAT }}

      - name: Analyze for critical and high CVEs - tagged image
        id: docker-scout-image-cves
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ steps.meta.outputs.tags[0] }}
          platform: "linux/amd64"
          sarif-file: sarif.output.json

      - name: Upload SARIF result
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif.output.json

      - name: Parse SARIF for Critical/High CVEs
        id: parse-cves
        run: |
          # Extract CVEs from SARIF
          jq -r '.runs[0].results[] | 
            select(.level == "error" or .level == "warning") | 
            @json' sarif.output.json > vulnerabilities.json
          
          # Count vulnerabilities
          echo "count=$(jq -s 'length' vulnerabilities.json)" >> $GITHUB_OUTPUT

      - name: Create Jira tickets with actionable details
        if: steps.parse-cves.outputs.count > 0
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set +e
                    
          TICKET_COUNT=0
          ERROR_COUNT=0
          CREATED_TICKETS=()
          
          while IFS= read -r vuln; do
            CVE=$(echo "$vuln" | jq -r '.ruleId')
            PACKAGE=$(echo "$vuln" | jq -r '.locations[0].physicalLocation.artifactLocation.uri // "unknown"')
            VERSION=$(echo "$vuln" | jq -r '.locations[0].physicalLocation.region.snippet.text // "unknown"')
            RAW_MESSAGE=$(echo "$vuln" | jq -r '.message.text')
            SEVERITY=$(echo "$vuln" | jq -r '.level')
            
            # Sanitize MESSAGE: remove control characters but keep newlines/tabs
            MESSAGE=$(echo "$RAW_MESSAGE" | tr -d '\000-\010\013\014\016-\037')
            
            SEVERITY_TEXT=$([ "$SEVERITY" = "error" ] && echo "Critical" || echo "High")
            WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            TEAM_ID="${{ secrets.JIRA_TEAM_FIELD_ID }}"
            REPORT_DATE=$(date +%Y-%m-%d)
            VULN_COMPONENT="${PACKAGE}-${VERSION}"

            # Build request from template
            JIRA_REQUEST=$(jq \
              --arg cve "$CVE" \
              --arg pkg "$PACKAGE" \
              --arg ver "$VERSION" \
              --arg sev "$SEVERITY_TEXT" \
              --arg img "${{ steps.meta.outputs.tags[0] }}" \
              --arg msg "$MESSAGE" \
              --arg url "$WORKFLOW_URL" \
              --arg commit "${{ github.sha }}" \
              --arg summary "${CVE}: Python - ${PACKAGE}" \
              --arg teamId "$TEAM_ID" \
              --arg reportDate "$REPORT_DATE" \
              --arg cveArray "[${CVE}]" \
              --arg vulnComponent "$VULN_COMPONENT" \
              '
              walk(if type == "string" then
                gsub("\\$CVE"; $cve) |
                gsub("\\$PACKAGE"; $pkg) |
                gsub("\\$VERSION"; $ver) |
                gsub("\\$SEVERITY"; $sev) |
                gsub("\\$IMAGE"; $img) |
                gsub("\\$MESSAGE"; $msg) |
                gsub("\\$WORKFLOW_URL"; $url) |
                gsub("\\$COMMIT"; $commit) |
                gsub("\\$REPORT_DATE"; $reportDate) |
                gsub("\\$CVE_ARRAY"; $cveArray) |
                gsub("\\$VULN_COMPONENT"; $vulnComponent)
              else . end) |
              .fields.summary = $summary |
              if $teamId != "" then
                .fields.customfield_10001 = $teamId
              else . end
              ' .github/templates/jira-security-vuln.json)

            TEMP_REQUEST=$(mktemp)
            printf '%s\n' "$JIRA_REQUEST" > "$TEMP_REQUEST"
            
            JIRA_RESPONSE=$(curl -s --http1.1 -w "\n%{http_code}" --connect-timeout 30 --max-time 90 \
              -X POST "${JIRA_BASE_URL}/rest/api/3/issue" \
              -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -H "Accept: application/json" \
              --data-binary @"$TEMP_REQUEST")
            
            HTTP_CODE=$(echo "$JIRA_RESPONSE" | tail -n1)
            RESPONSE_BODY=$(echo "$JIRA_RESPONSE" | sed '$d')
            rm -f "$TEMP_REQUEST"
            
            # Process response
            if [[ "$HTTP_CODE" =~ ^2[0-9][0-9]$ ]]; then
              JIRA_KEY=$(echo "$RESPONSE_BODY" | jq -r '.key // "null"')
              if [ "$JIRA_KEY" != "null" ] && [ -n "$JIRA_KEY" ]; then
                CREATED_TICKETS+=("$JIRA_KEY")
                ((TICKET_COUNT++))
              else
                echo "❌ ${CVE}: Failed to parse ticket ID (HTTP ${HTTP_CODE})"
                ((ERROR_COUNT++))
              fi
            else
              echo "❌ ${CVE}: HTTP ${HTTP_CODE}"
              ((ERROR_COUNT++))
            fi
            
          done < vulnerabilities.json
          
          echo "========================================="
          if [ $TICKET_COUNT -gt 0 ]; then
            TICKET_LIST=$(IFS=', '; echo "${CREATED_TICKETS[*]}")
            echo "✅ Created ${TICKET_COUNT} tickets: ${TICKET_LIST}"
          fi
          
          if [ $ERROR_COUNT -gt 0 ]; then
            echo "❌ Failed to create ${ERROR_COUNT} tickets"
            exit 1
          fi

  ghcr_io:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read solarwinds_apm version requirement
        run: echo VERSION=$(head -n 1 image/requirements-nodeps.txt | cut -d '=' -f3) >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Package Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          context: image
          platforms: linux/amd64,linux/arm64
          build-args: version=${{ env.VERSION }}
          tags: ghcr.io/${{ github.repository_owner }}/autoinstrumentation-python:${{ env.VERSION }},ghcr.io/${{ github.repository_owner }}/autoinstrumentation-python:latest
